const GCAL_CLIENT_ID = "386754812709-a18clokvvp2f02t9diimqlfki7qv07lq.apps.googleusercontent.com";
const GCAL_SCOPES = "https://www.googleapis.com/auth/calendar.events";
const GCAL_API = "https://www.googleapis.com/calendar/v3";

// Google OAuth トークン管理
let gAccessToken = null;
function initGoogleAuth() {
  return new Promise((resolve) => {
    const check = () => {
      if (window.google?.accounts?.oauth2) { resolve(); return; }
      setTimeout(check, 100);
    };
    check();
  });
}
async function getGoogleToken() {
  if (gAccessToken) return gAccessToken;
  await initGoogleAuth();
  return new Promise((resolve, reject) => {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: GCAL_CLIENT_ID,
      scope: GCAL_SCOPES,
      callback: (resp) => {
        if (resp.error) { reject(new Error(resp.error)); return; }
        gAccessToken = resp.access_token;
        setTimeout(() => { gAccessToken = null; }, (resp.expires_in - 60) * 1000);
        resolve(gAccessToken);
      },
    });
    client.requestAccessToken();
  });
}
async function gcalFetch(path, opts = {}) {
  const token = await getGoogleToken();
  const res = await fetch(`${GCAL_API}${path}`, {
    ...opts,
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json", ...opts.headers },
  });
  if (!res.ok) throw new Error(`Google API error: ${res.status}`);
  const text = await res.text();
  return text ? JSON.parse(text) : {};
}

const today = new Date();
function getNextWeekend() {
  const d = new Date(today);
  const daysToSat = (6 - d.getDay() + 7) % 7 || 7;
  const sat = new Date(d); sat.setDate(d.getDate() + daysToSat);
  const sun = new Date(sat); sun.setDate(sat.getDate() + 1);
  return { sat, sun };
}

const NOTIF_SUPPORT = "Notification" in window;
function getPermissionStatus() { return NOTIF_SUPPORT ? Notification.permission : "unsupported"; }

// Service Worker登録（ページ読み込み時）
let swReady = null;
if ("serviceWorker" in navigator) {
  swReady = navigator.serviceWorker.register("./sw.js")
    .then(reg => { console.log("SW登録成功:", reg.scope); return reg; })
    .catch(e => { console.warn("SW登録失敗:", e); return null; });
}

async function requestPermission() {
  if (!NOTIF_SUPPORT) return "unsupported";
  if (Notification.permission !== "default") return Notification.permission;
  return await Notification.requestPermission();
}
async function showNotification(title, body, tag) {
  if (!NOTIF_SUPPORT || Notification.permission !== "granted") return;
  const reg = await navigator.serviceWorker?.ready;
  if (reg && reg.active) {
    reg.active.postMessage({ type:"SHOW_NOTIF", title, body, tag });
  } else {
    try { new Notification(title, { body, tag }); } catch(e) {}
  }
}
function fireTestNotification() {
  if (!NOTIF_SUPPORT || Notification.permission !== "granted") {
    alert("通知権限がありません: " + Notification.permission);
    return;
  }
  showNotification("🗓️ 週末プランナー", "テスト通知です！正常に動作しています。", "wplanner-test");
}
function scheduleFridayNotif(setNextFridayState) {
  const now = new Date();
  const next = new Date(now);
  const daysToFri = (now.getDay()===5 && now.getHours()<18) ? 0 : (5-now.getDay()+7)%7||7;
  next.setDate(now.getDate()+daysToFri); next.setHours(18,0,0,0);
  setNextFridayState(next);
  return setTimeout(()=>{
    showNotification("🗓️ 週末プランナー",
      `今週末（${fmt(sat)}〜${fmt(sun)}）のスケジュールを組む時間です！`,
      "wplanner-friday");
  }, next.getTime()-now.getTime());
}

const hp = s => ({ onMouseEnter:()=>s(true), onMouseLeave:()=>s(false) });

function HovBtn({ onClick, active, activeBg, activeBorder, activeText, children, className="", disabled=false }) {
  const [h,setH] = useState(false);
  return (
    <button onClick={onClick} disabled={disabled} {...hp(setH)}
      style={{ backgroundColor:active?activeBg||"#1a1a2e":h?"#f0f0f5":"transparent",
        borderColor:active?activeBorder||"#1a1a2e":"#e2e2e8",
        color:active?activeText||"#fff":"#6b6b80", opacity:disabled?0.4:1 }}
      className={`py-2.5 rounded-xl text-sm border font-medium transition-all duration-150 ${className}`}>
      {children}
    </button>
  );
}

function DurationSlider({ value, onChange }) {
  const min=15,max=480,step=15, pct=((value-min)/(max-min))*100;
  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <span className="text-sm" style={{color:"#9898a8"}}>所要時間</span>
        <span className="text-sm font-bold" style={{color:"#5a4fcf"}}>{fmtDur(value)}</span>
      </div>
      <div className="relative h-6 flex items-center">
        <div className="absolute w-full h-1.5 rounded-full" style={{backgroundColor:"#e8e8f0"}}/>
        <div className="absolute h-1.5 rounded-full" style={{width:`${pct}%`,backgroundColor:"#5a4fcf"}}/>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e=>onChange(Number(e.target.value))}
          className="absolute w-full opacity-0 cursor-pointer h-6" style={{zIndex:2}}/>
        <div className="absolute w-5 h-5 rounded-full shadow-md pointer-events-none"
          style={{left:`calc(${pct}% - 10px)`,backgroundColor:"white",border:"2px solid #5a4fcf"}}/>
      </div>
    </div>
  );
}

function BufferEditor({ label, buffers, onChange }) {
  const [adding,setAdding]=useState(false);

  const QUICK=[{label:"移動",mins:30},{label:"メイク",mins:45},{label:"シャワー",mins:30},{label:"準備",mins:30},{label:"移動（近め）",mins:15}];
  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs font-medium" style={{color:"#9898a8"}}>{label}</span>
        {buffers.length>0&&<span className="text-xs font-semibold" style={{color:"#5a4fcf"}}>計{buffers.reduce((s,b)=>s+b.mins,0)}分</span>}
      </div>
      {buffers.length>0&&(
        <div className="flex flex-wrap gap-1.5 mb-2">
          {buffers.map((b,i)=>(
            <span key={i} className="flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-medium"
              style={{backgroundColor:"#f0eeff",color:"#5a4fcf",border:"1px solid #ddd6fe"}}>
              {b.label}（{b.mins}分）
              <button onClick={()=>onChange(buffers.filter((_,j)=>j!==i))} className="ml-0.5 opacity-50 hover:opacity-100 text-xs">✕</button>
            </span>
          ))}
        </div>
      )}
      {!adding&&(
        <div className="flex flex-wrap gap-1.5">
          {QUICK.filter(q=>!buffers.find(b=>b.label===q.label)).map((q,i)=>(
            <button key={i} onClick={()=>onChange([...buffers,q])}
              className="px-2.5 py-1 rounded-lg text-xs border transition"
              style={{color:"#9898a8",borderColor:"#e2e2e8",backgroundColor:"transparent"}}>＋{q.label}</button>
          ))}
          <button onClick={()=>setAdding(true)} className="px-2.5 py-1 rounded-lg text-xs border"
            style={{color:"#9898a8",borderColor:"#e2e2e8",backgroundColor:"transparent"}}>＋カスタム</button>
        </div>
      )}
      {adding&&(
        <div className="flex gap-2 items-center mt-1">
          <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="名前"
            className="flex-1 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none" style={{border:"1px solid #e2e2e8",minWidth:0}}/>
          <input type="number" value={newMins} onChange={e=>setNewMins(Number(e.target.value))} min={5} max={120} step={5}

          <span className="text-xs" style={{color:"#9898a8"}}>分</span>

          <button onClick={()=>setAdding(false)} className="text-xs px-2 py-1.5 rounded-lg" style={{color:"#9898a8"}}>✕</button>
        </div>
      )}
    </div>
  );
}

function DayColumn({ dayKey, dayLabel, events, categories, onDelete, onUpdate, onAdd, onTimeChange }) {
  const colRef=useRef(null);
  const dragState=useRef(null);
  const [editingEv,setEditingEv]=useState(null);

  function startDrag(e,ev,mode) {
    e.preventDefault(); e.stopPropagation();
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const origSlot=toSlot(ev.time);
    const durSlots=Math.max(toSlot(ev.end_time)-origSlot,1);
    dragState.current={id:ev.id,startY:clientY,origSlot,durSlots,mode};
    function onMove(me) {
      const cy=me.touches?me.touches[0].clientY:me.clientY;
      const delta=Math.round((cy-dragState.current.startY)/SLOT_H);
      const {id,origSlot,durSlots,mode}=dragState.current;
      if (mode==='move') {
        const newSlot=Math.max(0,Math.min(29-durSlots,origSlot+delta));
        onTimeChange(dayKey,id,slotToTime(newSlot),slotToTime(newSlot+durSlots));
      } else {
        const newDur=Math.max(1,Math.min(30-origSlot,durSlots+delta));
        onTimeChange(dayKey,id,slotToTime(origSlot),slotToTime(origSlot+newDur));
      }
    }
    function onEnd() {
      dragState.current=null;
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onEnd);
      window.removeEventListener('touchmove',onMove);
      window.removeEventListener('touchend',onEnd);
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onEnd);
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onEnd);
  }

  return (
    <div className="flex-1 min-w-0">
      {editingEv&&(
        <EventEditModal ev={editingEv} categories={categories}
          onClose={()=>setEditingEv(null)}
          onDelete={(id)=>{onDelete(dayKey,id);setEditingEv(null);}}
          onSave={(updated)=>{onUpdate(dayKey,updated);setEditingEv(null);}}/>
      )}
      <div className="flex items-center justify-between mb-3 px-1">
        <h2 className="font-bold text-sm" style={{color:"#1a1a2e"}}>{dayLabel}</h2>
        <button onClick={onAdd} className="text-xs font-medium px-3 py-1 rounded-lg"
          style={{color:"#5a4fcf",border:"1px solid #c4b5fd"}}>＋ 追加</button>
      </div>
      <div ref={colRef} className="relative" style={{height:`${SLOT_H*30}px`}}>
        {HOURS.map(h=>(
          <div key={h} style={{position:"absolute",top:`${(h-7)*SLOT_H*2}px`,left:0,right:0,borderTop:"1px solid #f0f0f5"}}/>
        ))}
        {events.map(ev=>{
          const cat=categories.find(c=>c.id===ev.category)||categories[categories.length-1];
          const top=toSlot(ev.time)*SLOT_H;
          const durSlots=Math.max(toSlot(ev.end_time)-toSlot(ev.time),1);
          const h=durSlots*SLOT_H;
          return (
            <div key={ev.id}
              style={{position:"absolute",top:`${top}px`,left:"4px",right:"4px",height:`${h-2}px`,zIndex:10,
                backgroundColor:cat.bg,border:`1.5px solid ${cat.border}`,borderRadius:12,userSelect:"none",
                boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}
              className="overflow-hidden">
              <div onMouseDown={e=>startDrag(e,ev,'move')} onTouchStart={e=>startDrag(e,ev,'move')}
                onClick={()=>setEditingEv(ev)}
                style={{position:"absolute",top:0,left:0,right:0,bottom:14,cursor:"grab",padding:"6px 10px 2px"}}>
                <div style={{color:cat.text}} className="text-xs font-bold leading-snug truncate">{cat.emoji} {ev.title}</div>
                {h>SLOT_H&&<div style={{color:cat.text}} className="text-xs opacity-60 mt-0.5">{ev.time}〜{ev.end_time}</div>}
              </div>
              <div onMouseDown={e=>{e.stopPropagation();startDrag(e,ev,'resize');}}
                onTouchStart={e=>{e.stopPropagation();startDrag(e,ev,'resize');}}
                style={{position:"absolute",bottom:0,left:0,right:0,height:14,cursor:"ns-resize",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:3}}>
                <div style={{width:18,height:3,borderRadius:2,backgroundColor:cat.border}}/>
                <div style={{width:10,height:3,borderRadius:2,backgroundColor:cat.border,opacity:0.5}}/>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const [notifEnabled,setNotifEnabled]= useState(()=>loadJSON(SK.notif,true));
  const [permStatus,  setPermStatus]  = useState(getPermissionStatus);
  const [nextFriday,  setNextFriday]  = useState(null);
  const [isFriday18,  setIsFriday18]  = useState(false);
  const [step,        setStep]        = useState("input");
  const [satEvents,   setSatEvents]   = useState([]);
  const [sunEvents,   setSunEvents]   = useState([]);
  const [loading,     setLoading]     = useState("");
  const [error,       setError]       = useState("");
  const [saving,      setSaving]      = useState(false);
  const [saved,       setSaved]       = useState(false);
  const [weekComment, setWeekComment] = useState("");
  const [modal,       setModal]       = useState(null);
  const [catModal,    setCatModal]    = useState(false);
  const [addEvModal,  setAddEvModal]  = useState(null);
  const [newEv,       setNewEv]       = useState({title:"",category:"chores",time:"10:00",end_time:"11:00"});
  const timerHandle=useRef(null);

  useEffect(()=>{saveJSON(SK.categories,categories);},[categories]);
  useEffect(()=>{saveJSON(SK.fixedTasks,fixedTasks);},[fixedTasks]);
  useEffect(()=>{saveJSON(SK.weekTasks,weekTasks);},[weekTasks]);
  useEffect(()=>{saveJSON(SK.startTimes,startTimes);},[startTimes]);
  useEffect(()=>{saveJSON(SK.notif,notifEnabled);},[notifEnabled]);

  useEffect(()=>{
    if(timerHandle.current) clearTimeout(timerHandle.current);
    if(permStatus==="granted"&&notifEnabled) timerHandle.current=scheduleFridayNotif(setNextFriday);
    else setNextFriday(null);
    return ()=>{if(timerHandle.current)clearTimeout(timerHandle.current);};
  },[permStatus,notifEnabled]);

  useEffect(()=>{
    const check=()=>{const n=new Date();setIsFriday18(n.getDay()===5&&n.getHours()===18);};
    check(); const id=setInterval(check,60000); return ()=>clearInterval(id);
  },[]);

  async function handleRequestPerm(){setPermStatus(await requestPermission());}

  const onTimeChange=useCallback((day,id,newTime,newEnd)=>{
    (day==="sat"?setSatEvents:setSunEvents)(prev=>prev.map(e=>e.id===id?{...e,time:newTime,end_time:newEnd}:e));
  },[]);
  const onUpdate=useCallback((day,updated)=>{
    (day==="sat"?setSatEvents:setSunEvents)(prev=>prev.map(e=>e.id===updated.id?updated:e));
  },[]);
  const deleteEvent=useCallback((day,id)=>{
    (day==="sat"?setSatEvents:setSunEvents)(prev=>prev.filter(e=>e.id!==id));
  },[]);

  function addCalEvent(day) {
    const ev={...newEv,id:mkId()};
    (day==="sat"?setSatEvents:setSunEvents)(prev=>[...prev,ev].sort((a,b)=>a.time.localeCompare(b.time)));
    setAddEvModal(null);
    setNewEv({title:"",category:"chores",time:"10:00",end_time:"11:00"});
  }

  function buildTaskLines(tasks,dayKey){
    const lines=[];
    tasks.filter(t=>dayKey==="sat"?t.day!=="sun":t.day!=="sat").forEach(t=>{
      const timeNote=t.fixedTime&&t.time?`、開始時間固定:${t.time}`:"";
      (t.bufferBefore||[]).forEach(b=>lines.push(`  - ${b.label}（${b.mins}分）※「${t.title}」の直前`));
      lines.push(`  - 【メイン】${t.title}（${t.duration}分、カテゴリ:${t.category}${timeNote}）`);
      (t.bufferAfter||[]).forEach(b=>lines.push(`  - ${b.label}（${b.mins}分）※「${t.title}」の直後`));
    });
    return lines;
  }

  function simpleSchedule(tasks, startTime) {
    const events = [];
    let [h, m] = startTime.split(":").map(Number);
    const catGroups = {};
    tasks.forEach(t => {
      if (!catGroups[t.category]) catGroups[t.category] = [];
      catGroups[t.category].push(t);
    });
    const ordered = Object.values(catGroups).flat();
    ordered.forEach(t => {
      const allItems = [
        ...(t.bufferBefore||[]).map(b => ({title:b.label,category:t.category,mins:b.mins})),
        {title:t.title, category:t.category, mins:t.duration},
        ...(t.bufferAfter||[]).map(b => ({title:b.label,category:t.category,mins:b.mins})),
      ];
      allItems.forEach(item => {
        if (t.fixedTime && t.time && item.title === t.title) {
          [h, m] = t.time.split(":").map(Number);
        }
        const startStr = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
        m += item.mins;
        while (m >= 60) { h++; m -= 60; }
        if (h >= 22) { h = 22; m = 0; }
        const endStr = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
        events.push({id:mkId(), title:item.title, category:item.category, time:startStr, end_time:endStr});
      });
    });
    return events;
  }

  async function generate(){
    setStep("loading"); setError("");
    try {
      setLoading("📅 スケジュールを組み立て中...");
      const all=[...fixedTasks,...weekTasks];
      const satTasks=all.filter(t=>t.day!=="sun");
      const sunTasks=all.filter(t=>t.day!=="sat");
      setSatEvents(simpleSchedule(satTasks, startTimes.sat));
      setSunEvents(simpleSchedule(sunTasks, startTimes.sun));
      setWeekComment("");
      setStep("plan");
    } catch(e){setError("エラー: "+e.message);setStep("input");}
  }

  async function saveToCalendar(){
    setSaving(true); setError("");
    try {
      const allEvents=[
        ...satEvents.map(e=>({...e,date:fmtISO(sat)})),
        ...sunEvents.map(e=>({...e,date:fmtISO(sun)})),
      ];
      for (const ev of allEvents) {
        await gcalFetch("/calendars/primary/events", {
          method: "POST",
          body: JSON.stringify({
            summary: ev.title,
            start: { dateTime: `${ev.date}T${ev.time}:00`, timeZone: "Asia/Tokyo" },
            end:   { dateTime: `${ev.date}T${ev.end_time}:00`, timeZone: "Asia/Tokyo" },
          }),
        });
      }
      setSaved(true); setWeekTasks([]);
    } catch(e){setError("保存エラー: "+e.message);}
    setSaving(false);
  }

  const SECTIONS=[
    {key:"fixed",label:"📌 固定タスク",  sub:"毎週繰り越して使えます",tasks:fixedTasks,setTasks:setFixedTasks},
    {key:"week", label:"✨ 今週のタスク",sub:"来週金曜に自動リセット", tasks:weekTasks, setTasks:setWeekTasks},
  ];

    <div className="min-h-screen flex items-center justify-center" style={{backgroundColor:"#f5f5fa"}}>
      <div className="text-center">
        <div className="text-6xl mb-5" style={{animation:"bounce 1s infinite"}}>🗓️</div>
        <p className="font-semibold text-base" style={{color:"#1a1a2e"}}>{loading}</p>
        <p className="text-sm mt-1" style={{color:"#9898a8"}}>少々お待ちください...</p>
        <style>{`@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}`}</style>
      </div>
    </div>
  );

  if(step==="plan") return (
    <div className="min-h-screen p-3" style={{backgroundColor:"#f5f5fa"}}>
      <div className="max-w-3xl mx-auto rounded-2xl shadow-sm p-5" style={{backgroundColor:"white",border:"1px solid #e8e8f0"}}>
        <div className="flex items-center justify-between mb-4">
          <div>
            <h1 className="font-bold text-lg" style={{color:"#1a1a2e"}}>今週末のプラン</h1>
            <p className="text-sm mt-0.5" style={{color:"#9898a8"}}>{fmt(sat)} 〜 {fmt(sun)}</p>
          </div>
          <div className="flex gap-2">
            <button onClick={()=>{setStep("input");setSaved(false);}} className="text-sm px-4 py-2 rounded-xl"
              style={{border:"1px solid #e2e2e8",color:"#9898a8"}}>組み直す</button>
            {saved
              ? <div className="text-sm px-4 py-2 rounded-xl font-semibold"
                  style={{backgroundColor:"#f0fdf4",border:"1px solid #bbf7d0",color:"#15803d"}}>✓ 登録済み</div>

                  style={{backgroundColor:"#5a4fcf",color:"white"}}>

          </div>
        )}
        <p className="text-xs mb-3" style={{color:"#c0c0cc"}}>イベントをタップ → 編集・削除　下端をドラッグ → 時間調整</p>
        <div className="flex gap-3 overflow-x-auto">
          <div className="shrink-0 w-10 pt-9">
            {HOURS.map(h=>(
              <div key={h} style={{height:`${SLOT_H*2}px`,color:"#c0c0cc"}} className="text-xs -mt-2 leading-none">{h}:00</div>
            ))}
          </div>
          <DayColumn dayKey="sat" dayLabel={fmt(sat)} events={satEvents} categories={categories}
            onDelete={deleteEvent} onUpdate={onUpdate} onAdd={()=>setAddEvModal("sat")} onTimeChange={onTimeChange}/>
          <DayColumn dayKey="sun" dayLabel={fmt(sun)} events={sunEvents} categories={categories}
            onDelete={deleteEvent} onUpdate={onUpdate} onAdd={()=>setAddEvModal("sun")} onTimeChange={onTimeChange}/>
        </div>
        {error&&<p className="text-sm mt-2" style={{color:"#ef4444"}}>{error}</p>}
      </div>
      {addEvModal&&(
        <div className="fixed inset-0 flex items-center justify-center z-50 p-4"
          style={{backgroundColor:"rgba(0,0,0,0.4)",backdropFilter:"blur(4px)"}}>
          <div className="rounded-2xl p-6 w-full max-w-sm shadow-2xl bg-white" style={{border:"1px solid #e8e8f0"}}>
            <h3 className="font-bold text-base mb-5">イベントを追加</h3>
            <div className="space-y-4">
              <div>
                <label className="block text-sm mb-2" style={{color:"#9898a8"}}>タイトル</label>
                <input className="w-full rounded-xl px-4 py-3 text-sm focus:outline-none"
                  style={{border:"1px solid #e2e2e8",backgroundColor:"#fafafa"}}
                  value={newEv.title} onChange={e=>setNewEv(p=>({...p,title:e.target.value}))} placeholder="例：朝ラン"/>
              </div>
              <div className="flex gap-2">
                {[{k:"time",l:"開始"},{k:"end_time",l:"終了"}].map(({k,l})=>(
                  <div key={k} className="flex-1">
                    <label className="block text-sm mb-2" style={{color:"#9898a8"}}>{l}</label>
                    <input type="time" className="w-full rounded-xl px-3 py-3 text-sm focus:outline-none" style={{border:"1px solid #e2e2e8"}}
                      value={newEv[k]} onChange={e=>setNewEv(p=>({...p,[k]:e.target.value}))}/>
                  </div>
                ))}
              </div>
              <div>
                <label className="block text-sm mb-2" style={{color:"#9898a8"}}>カテゴリ</label>
                <div className="grid grid-cols-3 gap-2">
                  {categories.map(c=>(
                    <HovBtn key={c.id} onClick={()=>setNewEv(p=>({...p,category:c.id}))}
                      active={newEv.category===c.id} activeBg={c.bg} activeBorder={c.border} activeText={c.text}>
                      {c.emoji} {c.label}
                    </HovBtn>
                  ))}
                </div>
              </div>
            </div>
            <div className="flex gap-2 mt-6">
              <button onClick={()=>setAddEvModal(null)} className="flex-1 py-3 rounded-xl text-sm"
                style={{border:"1px solid #e2e2e8",color:"#9898a8"}}>キャンセル</button>
              <button onClick={()=>addCalEvent(addEvModal)} disabled={!newEv.title}
                className="flex-1 py-3 rounded-xl text-sm font-semibold disabled:opacity-30"
                style={{backgroundColor:"#5a4fcf",color:"white"}}>追加</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div className="min-h-screen p-4" style={{backgroundColor:"#f5f5fa"}}>
      <div className="max-w-lg mx-auto">
        <div className="rounded-2xl shadow-sm p-6" style={{backgroundColor:"white",border:"1px solid #e8e8f0"}}>
          <div className="text-center mb-6">
            <div className="text-5xl mb-3">🗓️</div>
            <h1 className="text-2xl font-bold" style={{color:"#1a1a2e",letterSpacing:"-0.5px"}}>週末プランナー</h1>
            <p className="text-sm mt-1" style={{color:"#9898a8"}}>{fmt(sat)} 〜 {fmt(sun)}</p>
            <button onClick={()=>setCatModal(true)} className="mt-3 text-xs font-semibold px-3 py-1.5 rounded-xl"
              style={{color:"#5a4fcf",border:"1px solid #c4b5fd",backgroundColor:"transparent"}}>カテゴリを管理</button>
          </div>
          {isFriday18&&(
            <div style={{background:"linear-gradient(135deg,#1a1a2e 0%,#2d2b55 100%)",borderRadius:16,padding:"16px 20px"}}
              className="flex items-center gap-3 mb-5">
              <span className="text-2xl">🔔</span>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold text-white">今週末のスケジュールを組む時間です！</p>
                <p className="text-xs mt-0.5" style={{color:"#a0a0c8"}}>金曜18:00 · タスクを確認して生成しましょう</p>
              </div>
              <button onClick={()=>setIsFriday18(false)} style={{color:"#a0a0c8"}} className="text-xs px-2 py-2 rounded-xl">✕</button>
            </div>
          )}
          <NotificationPanel permStatus={permStatus} onRequestPerm={handleRequestPerm}
            onTest={fireTestNotification} notifEnabled={notifEnabled}
            setNotifEnabled={setNotifEnabled} nextFriday={nextFriday}/>
          <StartTimeSettings startTimes={startTimes} onChange={setStartTimes}/>
          <div style={{backgroundColor:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:12}} className="flex items-center gap-2 px-3 py-2 mb-5">
            <span className="text-sm">♻️</span>
            <span className="text-xs font-medium" style={{color:"#1d4ed8"}}>今週タスクは毎週金曜に自動リセット</span>
          </div>
          {SECTIONS.map(({key,label,sub,tasks,setTasks},si)=>(
            <div key={key} className={si===1?"mt-6 pt-6":""} style={si===1?{borderTop:"1px solid #f0f0f5"}:{}}>
              <div className="flex items-center justify-between mb-3">
                <div>
                  <h2 className="font-bold text-base" style={{color:"#1a1a2e"}}>{label}</h2>
                  <p className="text-xs mt-0.5" style={{color:"#b0b0c0"}}>{sub}</p>
                </div>
                <button onClick={()=>setModal({type:key,data:null})} className="text-sm font-semibold px-4 py-2 rounded-xl"
                  style={{color:"#5a4fcf",border:"1px solid #c4b5fd",backgroundColor:"transparent"}}>＋ 追加</button>
              </div>
              <div className="space-y-2">
                {tasks.map(t=>(
                  <TaskCard key={t.id} task={t} categories={categories}
                    onEdit={()=>setModal({type:key,data:t})}
                    onDelete={()=>setTasks(p=>p.filter(x=>x.id!==t.id))}/>
                ))}
                {tasks.length===0&&(
                  <p className="text-sm text-center py-5" style={{color:"#d0d0dc"}}>
                    {key==="fixed"?"固定タスクなし":"今週のタスクを追加してみよう ✨"}
                  </p>
                )}
              </div>
            </div>
          ))}
          {error&&<p className="text-sm mt-4" style={{color:"#ef4444"}}>{error}</p>}
          <button onClick={generate}
            className="w-full py-4 mt-8 rounded-2xl font-bold text-base transition active:scale-95"
            style={{background:"linear-gradient(135deg,#5a4fcf 0%,#7c3aed 100%)",color:"white",boxShadow:"0 4px 20px rgba(90,79,207,0.35)"}}>
            スケジュールを組んでもらう →
          </button>
          <p className="text-xs text-center mt-3" style={{color:"#c0c0cc"}}>今週の疲れ具合も加味して提案します</p>
        </div>
      </div>
      {catModal&&(
        <CatManageModal categories={categories} onClose={()=>setCatModal(false)}
          onDelete={id=>setCategories(p=>p.filter(c=>c.id!==id))}
          onAdd={c=>setCategories(p=>[...p,c])}/>
      )}
      {modal&&(
        <TaskModal
          title={modal.type==="fixed"?(modal.data?"固定タスクを編集":"固定タスクを追加"):(modal.data?"今週タスクを編集":"今週タスクを追加")}
          initial={modal.data} categories={categories}
          onClose={()=>setModal(null)}
          onSave={t=>{
            const setter=modal.type==="fixed"?setFixedTasks:setWeekTasks;
            if(modal.data) setter(p=>p.map(x=>x.id===modal.data.id?{...t,id:x.id}:x));
            else setter(p=>[...p,{...t,id:mkId()}]);
            setModal(null);
          }}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
